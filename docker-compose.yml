services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: brickbuddy
      POSTGRES_PASSWORD: brickbuddy
      POSTGRES_DB: brickbuddy
    ports:
      - "5432:5432"
    volumes:
      - brickbuddy_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brickbuddy -d brickbuddy"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://brickbuddy:brickbuddy@db:5432/brickbuddy
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  brickbuddy_pgdata:
